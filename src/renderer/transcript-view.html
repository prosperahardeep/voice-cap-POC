<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Cap Live Transcripts</title>
    <link rel="stylesheet" href="./transcript-view.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel-grid">
        <article class="source-panel" data-source="mic">
          <h2 class="panel-title">Input microphone</h2>
          <pre class="transcript-text" data-role="transcript">Waiting for microphone transcript...</pre>
        </article>

        <article class="source-panel" data-source="system">
          <h2 class="panel-title">Input Third party Audio</h2>
          <pre class="transcript-text" data-role="transcript">Waiting for third party audio transcript...</pre>
        </article>
      </section>
    </main>

    <script src="./transcript-view.js"></script>
  </body>
</html>
